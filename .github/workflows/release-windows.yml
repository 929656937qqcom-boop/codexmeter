name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version, for example 0.2.0-beta.2 or 0.2.0
        required: true
        type: string
      channel:
        description: Update channel
        required: true
        default: beta
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: write

concurrency:
  group: release-windows-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    environment: ${{ inputs.channel == 'latest' && 'production' || 'beta' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set release version
        shell: pwsh
        run: |
          pnpm version "${{ inputs.version }}" --no-git-tag-version
          node -e "const fs=require('fs');const p=require('./package.json');p.build.publish[0].channel='${{ inputs.channel }}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
      - run: pnpm test
      - run: pnpm build
      - name: Package Windows NSIS updater
        shell: pwsh
        run: pnpm exec electron-builder --win nsis --publish never
      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ inputs.version }}"
          $title = "CodexMeter ${{ inputs.version }}"
          $notes = "Channel: ${{ inputs.channel }}`n`nAutomated Windows x64 build."
          $releaseArgs = @("release", "create", $tag, "--target", $env:GITHUB_SHA, "--title", $title, "--notes", $notes)
          if ("${{ inputs.channel }}" -eq "beta") { $releaseArgs += "--prerelease" }
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) { gh @releaseArgs }
          $metadata = if ("${{ inputs.channel }}" -eq "beta") { "release/beta.yml" } else { "release/latest.yml" }
          gh release upload $tag "release/CodexMeter-Setup-${{ inputs.version }}.exe" "release/CodexMeter-Setup-${{ inputs.version }}.exe.blockmap" $metadata --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: CodexMeter-Windows-${{ inputs.version }}
          path: |
            release/CodexMeter-Setup-*.exe
            release/CodexMeter-Setup-*.exe.blockmap
            release/*yml
          if-no-files-found: error
