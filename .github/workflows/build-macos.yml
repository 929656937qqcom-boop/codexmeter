name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "agent/**"
      - "cloud/**"
      - "public/**"
      - "build/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-macos.yml"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm agent:build
      - run: bash scripts/create-mac-icon.sh
      - name: Package Intel and Apple Silicon
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --mac dmg zip --x64 --arm64 --publish never
      - name: Publish macOS desktop Beta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --prerelease --target "$GITHUB_SHA" --title "CodexMeter ${VERSION}" --notes "Unsigned internal Beta for Windows and macOS."
          gh release upload "$TAG" \
            "release/CodexMeter-${VERSION}-mac-x64.dmg" \
            "release/CodexMeter-${VERSION}-mac-x64.zip" \
            "release/CodexMeter-${VERSION}-mac-arm64.dmg" \
            "release/CodexMeter-${VERSION}-mac-arm64.zip" \
            "release/CodexMeter-${VERSION}-mac-x64.dmg.blockmap" \
            "release/CodexMeter-${VERSION}-mac-x64.zip.blockmap" \
            "release/CodexMeter-${VERSION}-mac-arm64.dmg.blockmap" \
            "release/CodexMeter-${VERSION}-mac-arm64.zip.blockmap" \
            "release/beta-mac.yml" \
            --clobber
      - name: Package lightweight agents
        run: |
          NODE_VERSION=$(node -p "process.version")
          bash scripts/package-mac-agent.sh x64 "$NODE_VERSION"
          bash scripts/package-mac-agent.sh arm64 "$NODE_VERSION"
      - name: Publish rolling macOS agent release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view mac-agent-latest >/dev/null 2>&1 || gh release create mac-agent-latest --prerelease --title "CodexMeter macOS Agent (Latest Test)" --notes "Unsigned test build for Intel and Apple Silicon Macs."
          gh release upload mac-agent-latest release/CodexMeter-Agent-macOS-x64.zip release/CodexMeter-Agent-macOS-arm64.zip --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: CodexMeter-macOS
          path: |
            release/*.dmg
            release/*-mac-*.zip
            release/*.blockmap
            release/beta-mac.yml
            release/CodexMeter-Agent-macOS-*.zip
          if-no-files-found: error
